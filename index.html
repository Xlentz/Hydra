<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hydra-Logic | PWA Puzzle</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#09090b">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #09090b; 
            color: #f1f5f9; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
            touch-action: none; 
            user-select: none;
        }
        
        .glass-effect { 
            background: rgba(24, 24, 27, 0.75); 
            backdrop-filter: blur(16px) saturate(180%); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* High-End Canvas Glow Grid aus v13.4 */
        #game-canvas { 
            background-color: #09090b;
            background-image: 
                radial-gradient(circle at center, rgba(14, 165, 233, 0.08) 0%, transparent 65%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            background-position: center center;
        }

        /* Custom Scrollbar für Sektorenliste */
        .overflow-y-auto::-webkit-scrollbar {
            width: 6px;
        }
        .overflow-y-auto::-webkit-scrollbar-track {
            background: transparent;
        }
        .overflow-y-auto::-webkit-scrollbar-thumb {
            background: rgba(63, 63, 70, 0.5);
            border-radius: 3px;
        }
        .overflow-y-auto::-webkit-scrollbar-thumb:hover {
            background: rgba(6, 182, 212, 0.5);
        }
    </style>
</head>
<body class="w-screen h-screen flex flex-col justify-between items-center bg-zinc-950 p-4">

    <header class="w-full max-w-md glass-effect rounded-2xl p-4 flex justify-between items-center z-10">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-cyan-500 animate-pulse"></div>
            <h1 class="text-lg font-black tracking-wider uppercase text-transparent bg-clip-text bg-gradient-to-r from-slate-100 to-zinc-400">Hydra-Logic</h1>
        </div>
        <button id="profile-btn" class="flex items-center gap-2 bg-zinc-900/90 border border-zinc-800 hover:border-cyan-500/50 py-1.5 px-3 rounded-xl transition-all active:scale-95">
            <span id="top-avatar" class="text-sm">🕵️</span>
            <span id="top-agent-name" class="text-xs font-bold text-zinc-400">Agent-X</span>
            <span id="top-xp" class="text-xs font-bold text-cyan-400">0 XP</span>
            <span class="text-yellow-400 font-bold text-xs flex items-center gap-0.5">⭐ <span id="top-stars">0</span></span>
        </button>
    </header>

    <main class="w-full max-w-md flex-1 my-4 relative flex items-center justify-center">
        
        <section id="level-selection" class="w-full h-full flex flex-col justify-center">
            <div class="w-full text-center mb-2">
                <h2 id="menu-title" class="text-xs uppercase font-black tracking-widest text-zinc-500">Wähle ein Kapitel</h2>
            </div>
            <div id="level-grid" class="grid grid-cols-1 gap-3 p-1 max-h-[68vh] overflow-y-auto w-full">
                </div>
        </section>

        <section id="game-controls" class="w-full h-full flex flex-col justify-between hidden">
            <div class="glass-effect rounded-xl p-3 flex justify-between items-center mb-2">
                <div>
                    <h2 id="game-level-title" class="text-sm font-black uppercase text-slate-200">Sektor 01</h2>
                    <p id="game-level-hint" class="text-[10px] text-zinc-400 mt-0.5 max-w-[240px] truncate">Lade Mission...</p>
                </div>
                <div class="text-right">
                    <span id="game-clicks-display" class="text-xs font-black text-cyan-400 bg-cyan-950/40 border border-cyan-900/50 px-2 py-1 rounded-md">0 / 0</span>
                </div>
            </div>

            <div class="w-full aspect-square bg-zinc-950 rounded-2xl border border-zinc-900 relative flex items-center justify-center shadow-inner overflow-hidden">
                <canvas id="game-canvas" class="w-full h-full block"></canvas>
            </div>

            <div id="inventory-bar" class="grid grid-cols-5 gap-2 my-2 bg-zinc-900/40 border border-zinc-900/60 p-2 rounded-xl">
                </div>

            <div class="flex gap-3">
                <button id="menu-btn" class="flex-1 py-3.5 bg-zinc-900 border border-zinc-800 rounded-xl font-black text-xs uppercase tracking-wider text-zinc-400 hover:bg-zinc-800 transition-colors">Menü</button>
                <button id="reset-btn" class="flex-1 py-3.5 bg-zinc-900 border border-zinc-800 rounded-xl font-black text-xs uppercase tracking-wider text-zinc-400 hover:bg-zinc-800 transition-colors">Reset</button>
                <button id="flow-btn" class="flex-[2] py-3.5 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-xl font-black text-xs uppercase tracking-wider text-white shadow-[0_0_20px_rgba(6,182,212,0.3)] hover:brightness-110 transition-all active:scale-95">Fluss Starten</button>
            </div>
        </section>
    </main>

    <div id="modal-profile" class="fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 z-50 hidden">
        <div class="w-full max-w-sm glass-effect rounded-2xl p-6 border border-zinc-800">
            <h3 class="text-base font-black uppercase tracking-wider text-slate-200 mb-3">Dein Agenten-Profil</h3>
            
            <div class="mb-3">
                <label class="text-[10px] text-zinc-500 font-bold uppercase tracking-wider block mb-1">Codename Ändern</label>
                <input type="text" id="profile-name-input" maxlength="12" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-3 py-2 text-sm font-bold text-slate-200 focus:outline-none focus:border-cyan-500 transition-colors">
            </div>

            <div class="mb-4">
                <label class="text-[10px] text-zinc-500 font-bold uppercase tracking-wider block mb-1">Avatar Emoji Wählen</label>
                <div id="avatar-picker-grid" class="grid grid-cols-5 gap-2 bg-zinc-950 p-2 rounded-xl border border-zinc-900 max-h-[110px] overflow-y-auto">
                    </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-5">
                <div class="bg-zinc-950 p-3 rounded-xl border border-zinc-800 flex flex-col items-center text-center">
                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-wider mb-1">XP Rang</p>
                    <p class="text-[11px] font-black text-emerald-400 uppercase tracking-tight" id="modal-xp-rank">Novize</p>
                    <p class="text-[11px] font-bold text-zinc-400 mt-0.5" id="modal-xp">0 XP</p>
                </div>
                <div class="bg-zinc-950 p-3 rounded-xl border border-zinc-800 flex flex-col items-center text-center justify-center">
                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-wider mb-1">Sterne</p>
                    <p class="text-2xl font-black text-yellow-400" id="modal-stars">0</p>
                </div>
            </div>
            
            <div class="flex gap-4">
                <button id="btn-close-profile" class="flex-1 py-3.5 bg-zinc-800 rounded-xl text-xs font-black hover:bg-zinc-700 transition-colors uppercase tracking-wider text-zinc-300">Schließen</button>
                <button id="btn-save-profile" class="flex-1 py-3.5 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-xl text-xs font-black text-white hover:from-cyan-400 hover:to-blue-500 transition-all shadow-[0_0_15px_rgba(6,182,212,0.4)] uppercase tracking-wider">Speichern</button>
            </div>
            <button id="btn-reset-progress" class="w-full mt-3 py-2.5 bg-red-900/20 border border-red-500/40 rounded-xl text-[10px] font-bold hover:bg-red-900/40 transition-colors uppercase tracking-wider text-red-400">🚨 Fortschritt löschen</button>
        </div>
    </div>

    <div id="modal-win" class="fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 z-50 hidden">
        <div class="w-full max-w-sm glass-effect rounded-2xl p-6 text-center border border-zinc-800">
            <div class="text-4xl mb-2">🏆</div>
            <h3 class="text-lg font-black uppercase tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">Sektor Bereinigt!</h3>
            <p class="text-xs text-zinc-400 mt-1 mb-4" id="win-message">Hervorragende Arbeit, Agent.</p>
            
            <div class="flex justify-center gap-2 text-2xl my-4" id="win-stars-container">
                </div>

            <div class="bg-zinc-950 p-3 rounded-xl border border-zinc-900 text-center mb-6">
                <span class="text-[10px] font-bold uppercase text-zinc-500 tracking-wider">Belohnung:</span>
                <span class="text-sm font-black text-emerald-400 ml-1" id="win-xp-reward">+100 XP</span>
            </div>

            <button id="btn-next-level" class="w-full py-4 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-[0_0_20px_rgba(16,185,129,0.3)] transition-all">Nächster Sektor</button>
        </div>
    </div>

    <script src="levels_tutorial.js"></script>
    <script src="levels_standard.js"></script>
    <script src="levels_cross.js"></script>
    <script src="levels_mixer.js"></script>
    <script src="levels_splitter.js"></script>
    <script src="levels_expert.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
