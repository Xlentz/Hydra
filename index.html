<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hydra-Logic | PWA Puzzle</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none; 
        }
        .glass-effect {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #game-canvas {
            background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .tool-btn.active {
            background-color: #0891b2;
            border-color: #22d3ee;
            transform: scale(1.05);
        }
        .wall-pattern {
            background-image: repeating-linear-gradient(45deg, #1e293b 25%, transparent 25%, transparent 75%, #1e293b 75%, #1e293b), repeating-linear-gradient(45deg, #1e293b 25%, #0f172a 25%, #0f172a 75%, #1e293b 75%, #1e293b);
            background-position: 0 0, 10px 10px;
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="h-screen flex flex-col relative">

    <!-- HEADER MIT PROFIL-BUTTON -->
    <header class="p-3 glass-effect flex justify-between items-center z-10 shadow-lg">
        <div class="flex items-center gap-3">
            <!-- KORREKTES LOGO EINGEFÜGT -->
            <img src="logo.png" alt="Hydra-Logic Logo" class="w-10 h-10 rounded-lg shadow-lg shadow-cyan-500/20 object-cover bg-slate-800">
            <div>
                <h1 class="text-lg font-bold leading-none bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent">
                    HYDRA-LOGIC
                </h1>
                <p class="text-xs text-slate-400">Level <span id="header-level">0</span></p>
            </div>
        </div>
        
        <div class="flex gap-4 items-center">
            <!-- PROFIL BEREICH (Klickbar) -->
            <button id="btn-open-profile" class="text-right hover:bg-slate-800 p-2 rounded-xl transition-colors cursor-pointer flex flex-col items-end border border-transparent hover:border-slate-700">
                <div class="text-sm font-bold text-cyan-100" id="player-name">Gast-Techniker</div>
                <div class="flex items-center gap-2">
                    <div class="flex items-center gap-1">
                        <span id="player-stars" class="font-bold text-yellow-400 text-xs">0</span>
                        <svg class="w-3 h-3 text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                    </div>
                    <div class="text-[10px] text-slate-400 bg-slate-900 px-1.5 rounded"><span id="player-xp">0</span> XP</div>
                </div>
            </button>
            <button id="menu-btn" class="p-2 hover:bg-slate-700 rounded-full transition-colors" onclick="location.reload()">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>
            </button>
        </div>
    </header>

    <main class="flex-grow relative overflow-hidden bg-slate-900">
        <canvas id="game-canvas" class="w-full h-full"></canvas>

        <div id="level-selection" class="absolute inset-0 z-20 bg-slate-950/95 flex flex-col items-center p-6 transition-all duration-500 overflow-y-auto">
            <h2 class="text-2xl font-light mb-8 tracking-widest text-cyan-200 uppercase mt-4">Missionen</h2>
            <div id="level-grid" class="grid grid-cols-4 gap-4 max-w-2xl w-full pb-10">
                <!-- Level Buttons -->
            </div>
        </div>

        <!-- In-Game UI -->
        <div id="game-controls" class="absolute bottom-6 left-1/2 -translate-x-1/2 flex flex-col gap-2 w-[95%] max-w-lg hidden">
            
            <div class="glass-effect p-2 rounded-2xl flex justify-between items-center px-2 gap-1 border border-slate-700">
                <button class="tool-btn active flex-1 py-3 bg-slate-800 rounded-xl border border-slate-600 transition-all text-xs font-bold shadow" data-tool="PIPE">
                    Rohr (<span id="inv-pipes">0</span>)
                </button>
                <button class="tool-btn flex-1 py-3 bg-slate-800 rounded-xl border border-slate-600 transition-all text-xs font-bold shadow" data-tool="AND_GATE">
                    AND (<span id="inv-and">0</span>)
                </button>
                <button class="tool-btn flex-1 py-3 bg-slate-800 rounded-xl border border-slate-600 transition-all text-xs font-bold shadow" data-tool="MIXER">
                    Mixer (<span id="inv-mix">0</span>)
                </button>
                <button class="tool-btn flex-1 py-3 bg-red-900/40 rounded-xl border border-red-800 transition-all text-xs font-bold text-red-200 shadow" data-tool="DELETE">
                    Löschen
                </button>
            </div>

            <div class="flex gap-2">
                <button id="btn-reset" class="p-4 bg-slate-800 rounded-2xl border border-slate-700 hover:bg-slate-700 glass-effect">
                    <svg class="w-6 h-6 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
                <button id="btn-play" class="flex-grow py-4 bg-gradient-to-r from-cyan-600 to-emerald-600 rounded-2xl font-bold uppercase tracking-wider shadow-lg shadow-emerald-900/50 hover:from-cyan-500 hover:to-emerald-500 transition-all border border-cyan-400/30">
                    Fluss Starten
                </button>
            </div>
        </div>
        
        <!-- Win Overlay -->
        <div id="win-overlay" class="absolute inset-0 z-30 bg-black/90 flex flex-col items-center justify-center hidden backdrop-blur-sm">
            <h2 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-200 mb-4 drop-shadow-lg">Level Abgeschlossen!</h2>
            <p id="win-xp" class="text-2xl text-cyan-300 mb-8 font-bold">+100 XP</p>
            <button id="btn-next" class="px-8 py-4 bg-cyan-600 rounded-xl font-bold text-white hover:bg-cyan-500 transition-colors shadow-lg shadow-cyan-900/50 uppercase tracking-widest text-lg">Nächstes Level</button>
        </div>

    </main>

    <!-- PROFIL MODAL -->
    <div id="profile-modal" class="absolute inset-0 z-50 bg-black/80 hidden flex items-center justify-center backdrop-blur-md">
        <div class="bg-slate-800 border border-slate-600 p-6 rounded-2xl w-80 shadow-2xl">
            <h2 class="text-xl font-bold text-cyan-300 mb-4 border-b border-slate-700 pb-2">Mein Profil</h2>
            
            <div class="mb-4">
                <label class="block text-xs text-slate-400 mb-1">Spielername</label>
                <input type="text" id="input-player-name" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-2 text-white focus:outline-none focus:border-cyan-500" placeholder="Dein Name...">
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-slate-900 p-3 rounded-lg border border-slate-700 text-center">
                    <p class="text-[10px] text-slate-400 uppercase tracking-wider">Erfahrung</p>
                    <p class="text-lg font-bold text-emerald-400" id="modal-xp">0 XP</p>
                </div>
                <div class="bg-slate-900 p-3 rounded-lg border border-slate-700 text-center">
                    <p class="text-[10px] text-slate-400 uppercase tracking-wider">Level gelöst</p>
                    <p class="text-lg font-bold text-yellow-400" id="modal-stars">0</p>
                </div>
            </div>
            
            <div class="flex gap-2">
                <button id="btn-close-profile" class="flex-1 py-2 bg-slate-700 rounded-lg text-sm font-bold hover:bg-slate-600 transition-colors">Abbrechen</button>
                <button id="btn-save-profile" class="flex-1 py-2 bg-cyan-600 rounded-lg text-sm font-bold hover:bg-cyan-500 transition-colors">Speichern</button>
            </div>
        </div>
    </div>

    <footer class="px-4 py-2 text-[10px] text-slate-500 flex justify-between border-t border-slate-800 bg-slate-900 z-10 relative">
        <span>Hydra-Logic v2.0</span>
        <span id="level-title" class="text-cyan-400 font-bold uppercase">Kein Level geladen</span>
    </footer>

    <script src="levels.js"></script>
    <script src="app.js"></script>
</body>
</html>
