<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hydra-Logic | PWA Puzzle</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none; /* Prevent pinch zoom etc */
        }
        .glass-effect {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #game-canvas {
            background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .tool-btn.active {
            background-color: #0891b2;
            border-color: #22d3ee;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="p-3 glass-effect flex justify-between items-center z-10 shadow-lg">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-slate-800 rounded-lg shadow-lg flex items-center justify-center text-cyan-400 font-bold text-xl border border-cyan-500/30">H</div>
            <div>
                <h1 class="text-lg font-bold leading-none bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent">
                    HYDRA-LOGIC
                </h1>
                <p id="player-name" class="text-xs text-slate-400">Gast-Techniker</p>
            </div>
        </div>
        
        <div class="flex gap-4 items-center">
            <div class="text-right">
                <div class="flex items-center gap-1 justify-end">
                    <span id="player-stars" class="font-bold text-yellow-400">0</span>
                    <svg class="w-4 h-4 text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                </div>
                <div class="text-[10px] text-slate-400"><span id="player-xp">0</span> XP</div>
            </div>
            <button id="menu-btn" class="p-2 hover:bg-slate-700 rounded-full transition-colors" onclick="location.reload()">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>
            </button>
        </div>
    </header>

    <main class="flex-grow relative overflow-hidden bg-slate-900">
        <canvas id="game-canvas" class="w-full h-full"></canvas>

        <div id="level-selection" class="absolute inset-0 z-20 bg-slate-950/95 flex flex-col items-center p-6 transition-all duration-500 overflow-y-auto">
            <h2 class="text-2xl font-light mb-8 tracking-widest text-cyan-200 uppercase mt-4">Wähle eine Mission</h2>
            <div id="level-grid" class="grid grid-cols-5 gap-3 max-w-2xl w-full pb-10">
                <!-- Level Buttons -->
            </div>
        </div>

        <!-- In-Game UI -->
        <div id="game-controls" class="absolute bottom-6 left-1/2 -translate-x-1/2 flex flex-col gap-2 w-[90%] max-w-md hidden">
            
            <!-- Inventory Toolbar -->
            <div class="glass-effect p-2 rounded-2xl flex justify-between items-center px-4 gap-2 border border-slate-700">
                <button class="tool-btn active flex-1 py-2 bg-slate-800 rounded-xl border border-slate-600 transition-all text-xs font-bold" data-tool="PIPE">
                    Rohr (<span id="inv-pipes">0</span>)
                </button>
                <button class="tool-btn flex-1 py-2 bg-slate-800 rounded-xl border border-slate-600 transition-all text-xs font-bold" data-tool="AND_GATE">
                    AND (<span id="inv-and">0</span>)
                </button>
                <button class="tool-btn flex-1 py-2 bg-slate-800 rounded-xl border border-slate-600 transition-all text-xs font-bold" data-tool="MIXER">
                    Mixer (<span id="inv-mix">0</span>)
                </button>
                <button class="tool-btn flex-1 py-2 bg-red-900/50 rounded-xl border border-red-800 transition-all text-xs font-bold text-red-200" data-tool="DELETE">
                    Löschen
                </button>
            </div>

            <!-- Action Bar -->
            <div class="flex gap-2">
                <button id="btn-reset" class="p-4 bg-slate-800 rounded-2xl border border-slate-700 hover:bg-slate-700 glass-effect">
                    <svg class="w-6 h-6 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
                <button id="btn-play" class="flex-grow py-4 bg-gradient-to-r from-cyan-600 to-emerald-600 rounded-2xl font-bold uppercase tracking-wider shadow-lg shadow-emerald-900/50 hover:from-cyan-500 hover:to-emerald-500 transition-all border border-cyan-400/30">
                    Fluss Starten
                </button>
            </div>
        </div>
        
        <!-- Win Overlay -->
        <div id="win-overlay" class="absolute inset-0 z-30 bg-black/80 flex flex-col items-center justify-center hidden">
            <h2 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-200 mb-4 drop-shadow-lg">Level Abgeschlossen!</h2>
            <p id="win-xp" class="text-xl text-cyan-300 mb-8">+100 XP</p>
            <button id="btn-next" class="px-8 py-3 bg-cyan-600 rounded-xl font-bold text-white hover:bg-cyan-500 transition-colors">Nächstes Level</button>
        </div>

    </main>

    <footer class="px-4 py-2 text-[10px] text-slate-500 flex justify-between border-t border-slate-800 bg-slate-900 z-10">
        <span>v1.0.0 Alpha - 50 Levels Edition</span>
        <span id="level-title" class="text-cyan-400 font-bold uppercase">Kein Level geladen</span>
    </footer>

    <script src="levels.js"></script>
    <script src="app.js"></script>
</body>
</html>
