<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hydra-Logic | PWA Puzzle</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#09090b">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09090b; color: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; touch-action: none; }
        
        /* New Glassmorphism / UI Enhancements */
        .glass-effect { 
            background: rgba(24, 24, 27, 0.75); 
            backdrop-filter: blur(16px) saturate(180%); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        
        /* High-End Canvas Glow Grid */
        #game-canvas { 
            background-color: #09090b;
            background-image: 
                radial-gradient(circle at center, rgba(14, 165, 233, 0.08) 0%, transparent 60%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            background-position: center center;
        }
        
        /* Modern Tool Buttons */
        .tool-btn {
            position: relative; overflow: hidden;
            background: linear-gradient(145deg, #18181b, #27272a);
        }
        .tool-btn::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at top left, rgba(255,255,255,0.1), transparent);
        }
        .tool-btn.active { 
            background: linear-gradient(145deg, #0284c7, #0369a1); 
            border-color: #38bdf8; 
            transform: translateY(-2px); 
            box-shadow: 0 8px 15px rgba(2, 132, 199, 0.4); 
        }
        
        .avatar-btn.selected { 
            border-color: #38bdf8; 
            background: rgba(56, 189, 248, 0.15); 
            transform: scale(1.1); 
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }
        
        .star-icon { color: #3f3f46; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .star-icon.filled { 
            color: #fbbf24; 
            filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.7)); 
            transform: scale(1.1);
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(24, 24, 27, 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(56, 189, 248, 0.4); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(56, 189, 248, 0.8); }
    </style>
</head>
<body class="h-screen flex flex-col relative">

    <header class="p-3 glass-effect flex justify-between items-center z-10 shrink-0 border-b border-zinc-800/50">
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="Hydra" class="w-12 h-12 rounded-xl shadow-[0_0_15px_rgba(2,132,199,0.5)] object-cover border border-cyan-400/30">
            <div class="flex flex-col justify-center">
                <p class="text-sm sm:text-xs text-cyan-400 tracking-widest uppercase font-black drop-shadow-[0_0_5px_rgba(34,211,238,0.3)] whitespace-nowrap" id="header-level-info">Sektor 0</p>
                <div class="flex items-center gap-1 mt-0.5 whitespace-nowrap">
                    <span class="text-[9px] sm:text-[10px] text-zinc-500 uppercase font-bold tracking-widest">Teile:</span>
                    <span id="click-counter" class="text-white font-black text-[10px] sm:text-xs">0</span>
                    <span class="text-zinc-600 text-[10px] sm:text-xs">/</span>
                    <span id="par-clicks" class="text-yellow-400 font-bold text-[10px] sm:text-xs">0</span>
                </div>
            </div>
        </div>
        
        <div class="flex gap-2 sm:gap-3 items-center shrink-0">
            <button id="btn-open-profile" class="flex items-center gap-2 sm:gap-3 hover:bg-zinc-800/80 p-1.5 pr-3 sm:pr-4 rounded-full transition-all border border-zinc-700/50 hover:border-cyan-500/50 hover:shadow-[0_0_10px_rgba(6,182,212,0.2)] whitespace-nowrap">
                <div id="header-avatar" class="text-xl sm:text-2xl bg-zinc-800 rounded-full w-8 h-8 sm:w-10 sm:h-10 flex items-center justify-center shadow-inner border border-zinc-700 shrink-0">👽</div>
                <div class="text-left flex flex-col justify-center">
                    <div class="text-xs sm:text-sm font-bold text-zinc-100 leading-none truncate max-w-[70px] sm:max-w-[120px]" id="player-name" class="text-xs sm:text-sm font-bold text-zinc-100 leading-none truncate max-w-[70px] sm:max-w-[120px] whitespace-nowrap">Gast</div>
                    <div class="text-[10px] sm:text-[11px] font-black text-cyan-400 drop-shadow-[0_0_5px_rgba(34,211,238,0.4)] tracking-wider mt-1" id="player-xp-header">0 XP</div>
                </div>
            </button>
            <button id="menu-btn" class="p-2 sm:p-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-xl transition-colors border border-zinc-700 shrink-0 text-xl sm:text-2xl flex items-center justify-center" >🏠</button>
        </div>
    </header>

    <main class="flex-grow relative overflow-hidden bg-zinc-950">
        <canvas id="game-canvas" class="w-full h-full absolute inset-0"></canvas>

        <div id="level-selection" class="absolute inset-0 z-20 bg-zinc-950/95 flex flex-col items-center p-6 transition-all duration-500 overflow-y-auto backdrop-blur-xl">
            
            
            
            <div class="flex justify-between items-center mb-6 bg-zinc-900/50 p-2 sm:p-3 rounded-2xl border border-zinc-800">
                <button id="btn-prev-page" class="p-2 sm:px-4 sm:py-2 bg-zinc-800 rounded-xl text-white font-bold hover:bg-zinc-700 disabled:opacity-30 disabled:cursor-not-allowed transition-all text-xs sm:text-sm shadow-md">◀ Zurück</button>
                <span id="page-indicator" class="text-white font-black text-sm sm:text-base tracking-widest uppercase">Sektor 1 - 40</span>
                <button id="btn-next-page" class="p-2 sm:px-4 sm:py-2 bg-zinc-800 rounded-xl text-white font-bold hover:bg-zinc-700 disabled:opacity-30 disabled:cursor-not-allowed transition-all text-xs sm:text-sm shadow-md">Weiter ▶</button>
            </div>
            <div id="level-grid" class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-6 gap-3 sm:gap-4 pb-20"></div>


        </div>

        <div id="game-controls" class="absolute bottom-6 left-1/2 -translate-x-1/2 flex flex-col gap-3 w-[95%] max-w-2xl hidden pointer-events-auto z-10">
            
            
            <div class="glass-effect p-2.5 rounded-2xl flex justify-start items-center px-3 gap-3 border border-zinc-800 overflow-x-auto pb-2.5 shadow-2xl">
                <button class="tool-btn active shrink-0 w-[70px] h-[70px] rounded-xl border border-zinc-700 transition-all text-xs font-bold shadow-lg flex flex-col items-center justify-center text-zinc-300" data-tool="PIPE_STRAIGHT" id="btn-t-straight">
                    <span class="text-3xl drop-shadow-md">━</span> <span class="text-[10px] mt-1 text-cyan-200 whitespace-nowrap leading-none"><span id="inv-straight">0</span>x</span>
                </button>
                <button class="tool-btn shrink-0 w-[70px] h-[70px] rounded-xl border border-zinc-700 transition-all text-xs font-bold shadow-lg flex flex-col items-center justify-center text-zinc-300" data-tool="PIPE_ANGLE" id="btn-t-angle">
                    <span class="text-3xl drop-shadow-md">┗</span> <span class="text-[10px] mt-1 text-cyan-200 whitespace-nowrap leading-none"><span id="inv-angle">0</span>x</span>
                </button>
                <button class="tool-btn shrink-0 w-[70px] h-[70px] rounded-xl border border-zinc-700 transition-all text-xs font-bold shadow-lg flex flex-col items-center justify-center text-zinc-300" data-tool="PIPE_CROSS" id="btn-t-cross">
                    <span class="text-3xl drop-shadow-md">╋</span> <span class="text-[10px] mt-1 text-cyan-200 whitespace-nowrap leading-none"><span id="inv-cross">0</span>x</span>
                </button>
                <button class="tool-btn shrink-0 w-[70px] h-[70px] rounded-xl border border-zinc-700 transition-all text-xs font-bold shadow-lg flex flex-col items-center justify-center text-zinc-300" data-tool="AND_GATE" id="btn-t-and">
                    <span class="text-2xl drop-shadow-md font-black">&</span> <span class="text-[10px] mt-1 text-cyan-200 whitespace-nowrap leading-none"><span id="inv-and">0</span>x</span>
                </button>
                <button class="tool-btn shrink-0 w-[70px] h-[70px] rounded-xl border border-zinc-700 transition-all text-xs font-bold shadow-lg flex flex-col items-center justify-center text-zinc-300" data-tool="MIXER" id="btn-t-mix">
                    <span class="text-2xl drop-shadow-md font-black">M</span> <span class="text-[10px] mt-1 text-cyan-200 whitespace-nowrap leading-none"><span id="inv-mix">0</span>x</span>
                </button>
                <button class="tool-btn shrink-0 w-[70px] h-[70px] rounded-xl border border-zinc-700 transition-all text-xs font-bold shadow-lg flex flex-col items-center justify-center text-zinc-300" data-tool="SPLITTER" id="btn-t-split">
                    <span class="text-2xl drop-shadow-md font-black">S</span> <span class="text-[10px] mt-1 text-cyan-200 whitespace-nowrap leading-none"><span id="inv-split">0</span>x</span>
                </button>
                <button class="tool-btn shrink-0 w-[70px] h-[70px] rounded-xl border border-zinc-700 transition-all text-xs font-bold shadow-lg flex flex-col items-center justify-center text-zinc-300" data-tool="PORTAL" id="btn-t-portal">
                    <span class="text-2xl drop-shadow-md font-black">O</span> <span class="text-[10px] mt-1 text-cyan-200 whitespace-nowrap leading-none"><span id="inv-portal">0</span>x</span>
                </button>
                <button class="tool-btn shrink-0 w-[70px] h-[70px] rounded-xl border border-zinc-700 transition-all text-xs font-bold shadow-lg flex flex-col items-center justify-center text-zinc-300" data-tool="VALVE" id="btn-t-valve">
                    <span class="text-2xl drop-shadow-md font-black">V</span> <span class="text-[10px] mt-1 text-cyan-200 whitespace-nowrap leading-none"><span id="inv-valve">0</span>x</span>
                </button>
                
                <button class="shrink-0 w-[70px] h-[70px] bg-rose-950/40 rounded-xl border border-rose-900/50 hover:bg-rose-900/60 transition-all text-xs font-bold text-rose-300 shadow-lg flex flex-col items-center justify-center ml-auto" data-tool="DELETE" id="btn-t-delete">
                    <span class="text-2xl drop-shadow-md">✖</span> <span class="text-[10px] mt-1 whitespace-nowrap leading-none">Löschen</span>
                </button>
            </div>

            <div class="flex gap-3">
                <button id="btn-solution" class="p-4 bg-zinc-800 rounded-2xl border border-zinc-700 hover:bg-zinc-700 shadow-lg transition-colors" title="Tipp anzeigen">
                    <svg class="w-7 h-7 text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.5)]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2a7 7 0 00-7 7c0 2.38 1.19 4.47 3 5.74V17a1 1 0 001 1h6a1 1 0 001-1v-2.26c1.81-1.27 3-3.36 3-5.74a7 7 0 00-7-7zM9 21a1 1 0 001 1h4a1 1 0 001-1v-1H9v1z"></path></svg>
                </button>
                <button id="btn-reset" class="p-4 bg-zinc-800 rounded-2xl border border-zinc-700 hover:bg-zinc-700 shadow-lg transition-colors" title="Neustart">
                    <svg class="w-7 h-7 text-zinc-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
                <button id="btn-play" class="flex-grow py-3 sm:py-4 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-2xl font-black uppercase tracking-widest shadow-[0_0_20px_rgba(6,182,212,0.4)] hover:shadow-[0_0_30px_rgba(6,182,212,0.6)] hover:scale-[1.02] transition-all text-white border border-cyan-400/30 text-sm sm:text-lg whitespace-nowrap">
                    System Starten
                </button>
            </div>
        </div>

        <div id="win-overlay" class="absolute inset-0 z-30 bg-zinc-950/90 flex flex-col items-center justify-center hidden backdrop-blur-xl">
            <div class="w-20 h-20 bg-emerald-500/20 border border-emerald-400 rounded-full flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(16,185,129,0.4)]">
                <svg class="w-10 h-10 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-3xl sm:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-300 to-cyan-300 mb-2 drop-shadow-lg text-center tracking-wider break-words px-4" id="win-title">Sektor Bereinigt</h2>
            <p class="text-sm text-zinc-400 mb-8 font-semibold tracking-widest uppercase" id="win-subtitle"></p>
            
            <div class="flex gap-6 mb-8" id="win-stars">
                <svg class="w-16 h-16 star-icon" fill="currentColor" viewBox="0 0 20 20" id="star-1"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                <svg class="w-24 h-24 star-icon -mt-6" fill="currentColor" viewBox="0 0 20 20" id="star-2"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                <svg class="w-16 h-16 star-icon" fill="currentColor" viewBox="0 0 20 20" id="star-3"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
            </div>
            
            <div class="bg-zinc-900 border border-zinc-800 rounded-xl px-8 py-4 mb-10 shadow-inner">
                <p class="text-xs text-zinc-500 uppercase tracking-wider mb-1 text-center">Erfahrungsgewinn</p>
                <p id="win-xp" class="text-3xl text-cyan-400 font-black text-center drop-shadow-[0_0_10px_rgba(34,211,238,0.5)]">+100 XP</p>
            </div>
            
            <button id="btn-next" class="px-12 py-5 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-2xl font-black text-white hover:scale-105 transition-all shadow-[0_0_20px_rgba(6,182,212,0.5)] uppercase tracking-widest text-lg border border-cyan-400/30">Nächster Sektor</button>
        </div>

    </main>

    <div id="profile-modal" class="absolute inset-0 z-50 bg-black/80 hidden flex items-center justify-center backdrop-blur-xl">
        <div class="bg-zinc-900 border border-zinc-800 p-8 rounded-3xl w-[90%] max-w-md shadow-[0_0_50px_rgba(0,0,0,0.8)] max-h-[90vh] overflow-y-auto relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-500 to-blue-600"></div>
            
            <h2 class="text-2xl font-black text-white mb-6 tracking-wider uppercase">System Setup</h2>
            
            <div class="mb-5">
                <label class="block text-xs text-zinc-400 font-bold uppercase tracking-wider mb-2">Operator Name</label>
                <input type="text" id="input-player-name" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-4 text-white font-bold focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-colors">
            </div>

            <div class="mb-8">
                <label class="block text-xs text-zinc-400 font-bold uppercase tracking-wider mb-2">Avatar wählen</label>
                <div class="grid grid-cols-6 gap-2" id="avatar-container">
                    <button class="avatar-btn p-2 text-2xl bg-zinc-950 rounded-lg border border-zinc-800" data-avatar="👽">👽</button>
                    <button class="avatar-btn p-2 text-2xl bg-zinc-950 rounded-lg border border-zinc-800" data-avatar="👨🏻‍💼">👨🏻‍💼</button>
                    <button class="avatar-btn p-2 text-2xl bg-zinc-950 rounded-lg border border-zinc-800" data-avatar="🥷🏼">🥷🏼</button>
                    <button class="avatar-btn p-2 text-2xl bg-zinc-950 rounded-lg border border-zinc-800" data-avatar="🧙🏻">🧙🏻</button>
                    <button class="avatar-btn p-2 text-2xl bg-zinc-950 rounded-lg border border-zinc-800" data-avatar="👩🏻‍💼">👩🏻‍💼</button>
                    <button class="avatar-btn p-2 text-2xl bg-zinc-950 rounded-lg border border-zinc-800" data-avatar="🦊">🦊</button>
                    <button class="avatar-btn p-2 text-2xl bg-zinc-950 rounded-lg border border-zinc-800" data-avatar="🐵">🐵</button>
                    <button class="avatar-btn p-2 text-2xl bg-zinc-950 rounded-lg border border-zinc-800" data-avatar="🐶">🐶</button>
                    <button class="avatar-btn p-2 text-2xl bg-zinc-950 rounded-lg border border-zinc-800" data-avatar="🦁">🦁</button>
                    <button class="avatar-btn p-2 text-2xl bg-zinc-950 rounded-lg border border-zinc-800" data-avatar="🐯">🐯</button>
                    <button class="avatar-btn p-2 text-2xl bg-zinc-950 rounded-lg border border-zinc-800" data-avatar="🐰">🐰</button>
                    <button class="avatar-btn p-2 text-2xl bg-zinc-950 rounded-lg border border-zinc-800" data-avatar="🐭">🐭</button>
                </div>
            </div>
            
            <div class="mb-4 flex items-center justify-between bg-zinc-950 p-4 rounded-xl border border-zinc-800">
                <div>
                    <h3 class="text-sm font-bold text-white">Audio Systeme</h3>
                    <p class="text-[10px] text-zinc-500 uppercase mt-0.5">FX & Mechanik Sounds</p>
                </div>
                <button id="toggle-audio" class="w-14 h-7 bg-zinc-800 rounded-full relative transition-colors shadow-inner"><div class="w-7 h-7 bg-white rounded-full absolute left-0 top-0 shadow-md transition-transform" id="audio-knob"></div></button>
            </div>
            
            <div class="mb-8 flex items-center justify-between bg-zinc-950 p-4 rounded-xl border border-zinc-800">
                <div>
                    <h3 class="text-sm font-bold text-white">Farb-Analyse</h3>
                    <p class="text-[10px] text-zinc-500 uppercase mt-0.5">Symbole für Farbfehlsichtigkeit</p>
                </div>
                <button id="toggle-colorblind" class="w-14 h-7 bg-zinc-800 rounded-full relative transition-colors shadow-inner"><div class="w-7 h-7 bg-white rounded-full absolute left-0 top-0 shadow-md transition-transform" id="colorblind-knob"></div></button>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-zinc-950 p-4 rounded-xl border border-zinc-800 flex flex-col items-center">
                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-wider mb-1">XP Rang</p>
                    <p class="text-2xl font-black text-emerald-400" id="modal-xp">0 XP</p>
                </div>
                <div class="bg-zinc-950 p-4 rounded-xl border border-zinc-800 flex flex-col items-center">
                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-wider mb-1">Sterne</p>
                    <p class="text-2xl font-black text-yellow-400" id="modal-stars">0</p>
                </div>
            </div>
            
            <div class="flex gap-4">
                <button id="btn-close-profile" class="flex-1 py-4 bg-zinc-800 rounded-xl text-sm font-black hover:bg-zinc-700 transition-colors uppercase tracking-wider text-zinc-300">Schließen</button>
                
                <button id="btn-save-profile" class="flex-1 py-4 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-xl text-sm font-black text-white hover:from-cyan-400 hover:to-blue-500 transition-all shadow-[0_0_15px_rgba(6,182,212,0.4)] uppercase tracking-wider">Speichern</button>
            </div>
            <button id="btn-reset-progress" class="w-full mt-4 py-3 bg-red-900/30 border border-red-500/50 rounded-xl text-xs font-bold hover:bg-red-900/50 transition-colors uppercase tracking-wider text-red-400">🚨 Fortschritt zurücksetzen</button>

        </div>
    </div>

    
    
    <script src="levels_tutorial.js"></script>
    <script src="levels_standard.js"></script>
    <script src="levels_cross.js"></script>
    <script src="levels_mixer.js"></script>
    <script src="levels_splitter.js"></script>
    <script src="levels_expert.js"></script>
<script src="app.js"></script>
</body>
</html>
